<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Udvalgsovervågning – VisitMiddelfart</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            teal: { 600: '#2d8a7e', 700: '#3a9e8f', 800: '#1f7268' }
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: Inter, system-ui, sans-serif; }
    .fade-in { animation: fadeIn 0.3s ease-in; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .score-5 { background: #fecaca; color: #991b1b; }
    .score-4 { background: #fed7aa; color: #9a3412; }
    .score-3 { background: #fef08a; color: #854d0e; }
    .score-2 { background: #e5e7eb; color: #4b5563; }
    .score-1 { background: #f3f4f6; color: #6b7280; }
    .score-0 { background: #f3f4f6; color: #9ca3af; }
  </style>
</head>
<body class="bg-stone-50 text-stone-900 min-h-screen">

  <main class="max-w-7xl mx-auto px-4 py-8">
    <!-- Header -->
    <header class="mb-8">
      <div class="flex flex-col md:flex-row md:items-end md:justify-between gap-4">
        <div>
          <h1 class="text-3xl md:text-4xl font-bold mb-1">Udvalgsovervågning</h1>
          <p class="text-stone-500">Middelfart Kommune – politisk radar for VisitMiddelfart</p>
        </div>
        <div class="flex gap-2">
          <button onclick="hentOgKlassificer()" id="fetch-btn" class="px-4 py-2 rounded-lg bg-teal-700 text-white text-sm hover:bg-teal-800 transition">
            Hent dagsordener
          </button>
        </div>
      </div>
    </header>

    <!-- Filtre -->
    <section class="rounded-2xl bg-white border border-stone-200 p-4 mb-6">
      <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
        <div>
          <label class="text-xs font-medium text-stone-500 mb-1 block">Udvalg</label>
          <select id="filter-udvalg" onchange="applyFilters()" class="w-full rounded-lg border border-stone-300 px-3 py-2 text-sm">
            <option value="">Alle udvalg</option>
          </select>
        </div>
        <div>
          <label class="text-xs font-medium text-stone-500 mb-1 block">Kategori</label>
          <select id="filter-kategori" onchange="applyFilters()" class="w-full rounded-lg border border-stone-300 px-3 py-2 text-sm">
            <option value="">Alle kategorier</option>
            <option value="turisme">Turisme</option>
            <option value="erhverv">Erhverv</option>
            <option value="kultur">Kultur</option>
            <option value="klima">Klima</option>
            <option value="infrastruktur">Infrastruktur</option>
            <option value="bosætning">Bosætning</option>
            <option value="events">Events</option>
            <option value="budget">Budget</option>
            <option value="partnerskaber">Partnerskaber</option>
            <option value="andet">Andet</option>
          </select>
        </div>
        <div>
          <label class="text-xs font-medium text-stone-500 mb-1 block">Min. relevans</label>
          <select id="filter-relevans" onchange="applyFilters()" class="w-full rounded-lg border border-stone-300 px-3 py-2 text-sm">
            <option value="0">Alle</option>
            <option value="3" selected>3+ (relevant)</option>
            <option value="4">4+ (høj)</option>
            <option value="5">5 (kritisk)</option>
          </select>
        </div>
        <div>
          <label class="text-xs font-medium text-stone-500 mb-1 block">Status</label>
          <select id="filter-status" onchange="applyFilters()" class="w-full rounded-lg border border-stone-300 px-3 py-2 text-sm">
            <option value="">Alle</option>
            <option value="overvåg">Overvåg</option>
            <option value="afklar">Afklar</option>
            <option value="reager">Reager</option>
            <option value="foreslå møde">Foreslå møde</option>
            <option value="lever input">Lever input</option>
            <option value="ingen handling">Ingen handling</option>
          </select>
        </div>
      </div>
    </section>

    <!-- Stats bar -->
    <section id="stats-bar" class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6"></section>

    <!-- Loading -->
    <div id="loading" class="hidden text-center py-12">
      <div class="inline-block w-8 h-8 border-4 border-teal-700 border-t-transparent rounded-full animate-spin"></div>
      <p class="mt-3 text-stone-500 text-sm" id="loading-text">Henter dagsordener fra Middelfart Kommune...</p>
    </div>

    <!-- Empty -->
    <div id="empty-state" class="hidden text-center py-12">
      <p class="text-stone-400 text-lg mb-2">Ingen sager fundet</p>
      <p class="text-stone-400 text-sm">Klik "Hent dagsordener" for at hente data, eller ændr filtrene.</p>
    </div>

    <!-- Sager -->
    <section id="sager-grid" class="grid gap-4"></section>
  </main>

  <!-- Check-in Modal -->
  <div id="checkin-modal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl max-w-2xl w-full max-h-[90vh] overflow-y-auto p-6 shadow-2xl">
      <div class="flex justify-between items-start mb-4">
        <div>
          <h2 class="text-xl font-bold" id="modal-titel"></h2>
          <p class="text-sm text-stone-500" id="modal-udvalg"></p>
        </div>
        <button onclick="lukModal()" class="text-stone-400 hover:text-stone-600 text-2xl leading-none">&times;</button>
      </div>

      <div class="bg-stone-50 rounded-xl p-4 mb-4">
        <h3 class="text-sm font-semibold text-stone-600 mb-1">AI-resumé</h3>
        <p class="text-sm text-stone-700" id="modal-resume"></p>
      </div>

      <div class="mb-4">
        <label class="text-sm font-semibold text-stone-700 mb-2 block">Jeres data og input</label>
        <textarea id="modal-input" rows="5" placeholder="Tilføj jeres egne tal, cases, medlemsinput, overnatningsdata, eventdeltagelse..." class="w-full rounded-lg border border-stone-300 px-3 py-2 text-sm focus:ring-2 focus:ring-teal-700 focus:border-transparent"></textarea>
      </div>

      <div class="mb-4">
        <label class="text-sm font-semibold text-stone-700 mb-2 block">Tjekket ind af</label>
        <input id="modal-navn" type="text" placeholder="Dit navn" class="w-full rounded-lg border border-stone-300 px-3 py-2 text-sm" />
      </div>

      <div class="flex gap-3 mb-4">
        <button onclick="gemCheckin()" class="flex-1 px-4 py-2 rounded-lg bg-teal-700 text-white text-sm hover:bg-teal-800 transition">Gem check-in</button>
        <button onclick="genererVinkel()" class="flex-1 px-4 py-2 rounded-lg bg-stone-800 text-white text-sm hover:bg-stone-900 transition">Generér vores vinkel (AI)</button>
      </div>

      <div id="modal-vinkel-section" class="hidden">
        <h3 class="text-sm font-semibold text-stone-700 mb-2">Vores vinkel (AI-genereret)</h3>
        <div id="modal-vinkel" class="bg-teal-50 border border-teal-200 rounded-xl p-4 text-sm text-stone-800 whitespace-pre-wrap"></div>
        <button onclick="godkendVinkel()" class="mt-3 px-4 py-2 rounded-lg bg-teal-700 text-white text-sm hover:bg-teal-800 transition">Godkend og gem vinkel</button>
      </div>

      <div id="modal-loading" class="hidden text-center py-4">
        <div class="inline-block w-6 h-6 border-3 border-teal-700 border-t-transparent rounded-full animate-spin"></div>
        <p class="mt-2 text-stone-500 text-sm">Arbejder...</p>
      </div>
    </div>
  </div>

  <script>
    // ===== STATE =====
    let alleSager = [];
    let filteredSager = [];
    let aktivSag = null;

    // ===== API =====
    async function hentOgKlassificer() {
      const btn = document.getElementById('fetch-btn');
      const loading = document.getElementById('loading');
      const loadingText = document.getElementById('loading-text');

      btn.disabled = true;
      btn.textContent = 'Henter...';
      loading.classList.remove('hidden');
      loadingText.textContent = 'Henter dagsordener fra Middelfart Kommune...';
      document.getElementById('sager-grid').innerHTML = '';
      document.getElementById('empty-state').classList.add('hidden');

      try {
        // Trin 1: Hent sager fra FirstAgenda
        const sagerRes = await fetch('/api/sager');
        const sagerData = await sagerRes.json();
        if (!sagerRes.ok) throw new Error(sagerData.error || 'Fejl ved hentning');

        alleSager = sagerData.sager || [];

        // Trin 2: Klassificér uklassificerede sager
        const uklassificerede = alleSager.filter(s => !s.relevans_score);
        if (uklassificerede.length > 0) {
          loadingText.textContent = `Klassificerer ${uklassificerede.length} sager med AI...`;

          // Send i batches af 10
          for (let i = 0; i < uklassificerede.length; i += 10) {
            const batch = uklassificerede.slice(i, i + 10);
            loadingText.textContent = `Klassificerer sager (${i + 1}-${Math.min(i + 10, uklassificerede.length)} af ${uklassificerede.length})...`;

            const classRes = await fetch('/api/classify', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ sager: batch })
            });
            const classData = await classRes.json();

            // Merge klassificeringer ind i alleSager
            for (const result of (classData.results || [])) {
              const sag = alleSager.find(s => s.id === result.id);
              if (sag) Object.assign(sag, result);
            }
          }
        }

        populateUdvalgFilter();
        applyFilters();

      } catch (e) {
        console.error('Fejl:', e);
        document.getElementById('empty-state').classList.remove('hidden');
        document.getElementById('empty-state').querySelector('p:first-child').textContent = 'Kunne ikke hente sager';
        document.getElementById('empty-state').querySelector('p:last-child').textContent = `Fejl: ${e.message}`;
      } finally {
        loading.classList.add('hidden');
        btn.disabled = false;
        btn.textContent = 'Hent dagsordener';
      }
    }

    async function gemCheckin() {
      if (!aktivSag) return;
      const input = document.getElementById('modal-input').value;
      const navn = document.getElementById('modal-navn').value;
      if (!input.trim()) { alert('Tilføj data/input først.'); return; }

      showModalLoading(true);
      try {
        await fetch('/api/checkin', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            sag_id: aktivSag.id,
            vores_input: input,
            tjekket_ind_af: navn,
            status: 'afklar'
          })
        });
        aktivSag.vores_input = input;
        aktivSag.tjekket_ind_af = navn;
        aktivSag.tjekket_ind_dato = new Date().toISOString();
        aktivSag.status = 'afklar';
        applyFilters();
        alert('Check-in gemt!');
      } catch (e) {
        alert('Fejl: ' + e.message);
      } finally {
        showModalLoading(false);
      }
    }

    async function genererVinkel() {
      if (!aktivSag) return;
      const input = document.getElementById('modal-input').value;
      if (!input.trim()) { alert('Tilføj data/input først, så AI kan skrive en vinkel.'); return; }

      showModalLoading(true);
      try {
        const res = await fetch('/api/genskriv', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            sag_id: aktivSag.id,
            titel: aktivSag.titel,
            udvalg: aktivSag.udvalg,
            resumé: aktivSag.resumé || '',
            vores_input: input
          })
        });
        const data = await res.json();
        document.getElementById('modal-vinkel').textContent = data.vores_vinkel || 'Ingen vinkel genereret.';
        document.getElementById('modal-vinkel-section').classList.remove('hidden');
        aktivSag.vores_vinkel = data.vores_vinkel;
      } catch (e) {
        alert('Fejl: ' + e.message);
      } finally {
        showModalLoading(false);
      }
    }

    function godkendVinkel() {
      if (aktivSag) {
        applyFilters();
        lukModal();
      }
    }

    // ===== UI =====
    function populateUdvalgFilter() {
      const select = document.getElementById('filter-udvalg');
      const udvalg = [...new Set(alleSager.map(s => s.udvalg))].sort();
      select.innerHTML = '<option value="">Alle udvalg</option>' +
        udvalg.map(u => `<option value="${u}">${u}</option>`).join('');
    }

    function applyFilters() {
      const udvalg = document.getElementById('filter-udvalg').value;
      const kategori = document.getElementById('filter-kategori').value;
      const minRelevans = parseInt(document.getElementById('filter-relevans').value) || 0;
      const status = document.getElementById('filter-status').value;

      filteredSager = alleSager.filter(s => {
        if (udvalg && s.udvalg !== udvalg) return false;
        if (kategori && s.kategori !== kategori) return false;
        if (parseInt(s.relevans_score) < minRelevans) return false;
        if (status && s.status !== status) return false;
        return true;
      });

      filteredSager.sort((a, b) => {
        const sa = parseInt(a.relevans_score) || 0;
        const sb = parseInt(b.relevans_score) || 0;
        if (sb !== sa) return sb - sa;
        return (b.møde_dato || '').localeCompare(a.møde_dato || '');
      });

      renderStats();
      renderSager();
    }

    function renderStats() {
      const bar = document.getElementById('stats-bar');
      const total = filteredSager.length;
      const høj = filteredSager.filter(s => parseInt(s.relevans_score) >= 4).length;
      const tjekketInd = filteredSager.filter(s => s.tjekket_ind_af).length;
      const kategorier = [...new Set(filteredSager.map(s => s.kategori).filter(Boolean))].length;

      bar.innerHTML = `
        <div class="rounded-xl bg-white border border-stone-200 p-4 text-center">
          <div class="text-2xl font-bold text-stone-800">${total}</div>
          <div class="text-xs text-stone-500">Sager</div>
        </div>
        <div class="rounded-xl bg-white border border-stone-200 p-4 text-center">
          <div class="text-2xl font-bold text-red-600">${høj}</div>
          <div class="text-xs text-stone-500">Høj relevans (4-5)</div>
        </div>
        <div class="rounded-xl bg-white border border-stone-200 p-4 text-center">
          <div class="text-2xl font-bold text-teal-700">${tjekketInd}</div>
          <div class="text-xs text-stone-500">Tjekket ind</div>
        </div>
        <div class="rounded-xl bg-white border border-stone-200 p-4 text-center">
          <div class="text-2xl font-bold text-stone-600">${kategorier}</div>
          <div class="text-xs text-stone-500">Kategorier</div>
        </div>`;
    }

    function renderSager() {
      const grid = document.getElementById('sager-grid');
      const empty = document.getElementById('empty-state');

      if (filteredSager.length === 0) {
        grid.innerHTML = '';
        empty.classList.remove('hidden');
        return;
      }
      empty.classList.add('hidden');
      grid.innerHTML = filteredSager.map(s => sagKort(s)).join('');
    }

    function sagKort(s) {
      const score = parseInt(s.relevans_score) || 0;
      const harVinkel = s.vores_vinkel && s.vores_vinkel.trim();
      const harCheckin = s.tjekket_ind_af && s.tjekket_ind_af.trim();
      const dato = s.møde_dato || '';
      const kategori = s.kategori || 'uklassificeret';
      const status = s.status || 'overvåg';

      const statusFarver = {
        'overvåg': 'bg-blue-100 text-blue-700',
        'afklar': 'bg-amber-100 text-amber-700',
        'reager': 'bg-red-100 text-red-700',
        'foreslå møde': 'bg-purple-100 text-purple-700',
        'lever input': 'bg-teal-100 text-teal-700',
        'ingen handling': 'bg-stone-100 text-stone-500'
      };
      const statusClass = statusFarver[status] || 'bg-stone-100 text-stone-500';

      return `
        <div class="rounded-2xl bg-white border border-stone-200 p-5 fade-in hover:shadow-md transition-shadow">
          <div class="flex flex-wrap items-start justify-between gap-3 mb-3">
            <div class="flex items-center gap-2 flex-wrap">
              <span class="score-${score} px-2.5 py-1 rounded-full text-xs font-bold">${score}/5</span>
              <span class="px-2 py-1 rounded-full bg-stone-100 text-stone-600 text-xs font-medium">${escHtml(kategori)}</span>
              <span class="px-2 py-1 rounded-full ${statusClass} text-xs font-medium">${escHtml(status)}</span>
              ${harCheckin ? '<span class="px-2 py-1 rounded-full bg-teal-100 text-teal-700 text-xs font-medium">Tjekket ind</span>' : ''}
            </div>
            <div class="text-xs text-stone-400">${dato}</div>
          </div>

          <h3 class="text-lg font-semibold mb-1">${escHtml(s.titel)}</h3>
          <p class="text-sm text-stone-500 mb-3">${escHtml(s.udvalg)} – Punkt ${s.punkt_nr}</p>

          ${s.resumé ? `
            <details class="mb-3">
              <summary class="text-sm text-teal-700 cursor-pointer hover:text-teal-800 font-medium">AI-resumé</summary>
              <p class="mt-2 text-sm text-stone-600 bg-stone-50 rounded-lg p-3">${escHtml(s.resumé)}</p>
              ${s.relevans_begrundelse ? `<p class="mt-1 text-xs text-stone-400 italic">${escHtml(s.relevans_begrundelse)}</p>` : ''}
            </details>
          ` : ''}

          ${harVinkel ? `
            <details class="mb-3">
              <summary class="text-sm text-teal-700 cursor-pointer hover:text-teal-800 font-medium">Vores vinkel</summary>
              <div class="mt-2 text-sm text-stone-700 bg-teal-50 border border-teal-200 rounded-lg p-3 whitespace-pre-wrap">${escHtml(s.vores_vinkel)}</div>
              <p class="mt-1 text-xs text-stone-400">Tjekket ind af ${escHtml(s.tjekket_ind_af)} – ${s.tjekket_ind_dato ? new Date(s.tjekket_ind_dato).toLocaleDateString('da-DK') : ''}</p>
            </details>
          ` : ''}

          <div class="flex flex-wrap gap-2 mt-3">
            <button onclick='abnCheckin("${s.id}")' class="px-3 py-1.5 rounded-lg bg-teal-700 text-white text-sm hover:bg-teal-800 transition">Tjek ind</button>
            <a href="${s.kilde_url}" target="_blank" rel="noopener noreferrer" class="px-3 py-1.5 rounded-lg bg-stone-200 text-stone-700 text-sm hover:bg-stone-300 transition inline-block">Åbn mødeside</a>
            <select onchange="opdaterStatus('${s.id}', this.value)" class="rounded-lg border border-stone-300 px-2 py-1.5 text-sm">
              ${['overvåg','afklar','reager','foreslå møde','lever input','ingen handling'].map(st =>
                `<option value="${st}" ${status === st ? 'selected' : ''}>${st}</option>`
              ).join('')}
            </select>
          </div>
        </div>`;
    }

    function abnCheckin(sagId) {
      aktivSag = alleSager.find(s => s.id === sagId);
      if (!aktivSag) return;

      document.getElementById('modal-titel').textContent = aktivSag.titel;
      document.getElementById('modal-udvalg').textContent = `${aktivSag.udvalg} – ${aktivSag.møde_dato} – Punkt ${aktivSag.punkt_nr}`;
      document.getElementById('modal-resume').textContent = aktivSag.resumé || aktivSag.indhold?.substring(0, 500) || 'Intet resumé endnu';
      document.getElementById('modal-input').value = aktivSag.vores_input || '';
      document.getElementById('modal-navn').value = aktivSag.tjekket_ind_af || '';

      if (aktivSag.vores_vinkel) {
        document.getElementById('modal-vinkel').textContent = aktivSag.vores_vinkel;
        document.getElementById('modal-vinkel-section').classList.remove('hidden');
      } else {
        document.getElementById('modal-vinkel-section').classList.add('hidden');
      }

      document.getElementById('checkin-modal').classList.remove('hidden');
    }

    function lukModal() {
      document.getElementById('checkin-modal').classList.add('hidden');
      aktivSag = null;
    }

    function showModalLoading(show) {
      document.getElementById('modal-loading').classList.toggle('hidden', !show);
    }

    function opdaterStatus(sagId, nyStatus) {
      const sag = alleSager.find(s => s.id === sagId);
      if (sag) {
        sag.status = nyStatus;
        fetch('/api/checkin', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            sag_id: sagId,
            vores_input: sag.vores_input || '',
            tjekket_ind_af: sag.tjekket_ind_af || 'system',
            status: nyStatus
          })
        }).catch(e => console.error('Status-opdatering fejlede:', e));
      }
    }

    function escHtml(str) {
      if (!str) return '';
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') lukModal();
    });
  </script>
</body>
</html>
